version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: bayanihan-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-5}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - FIREWORKS_GEMMA_MODEL=${FIREWORKS_GEMMA_MODEL:-accounts/fireworks/models/gemma2-9b-it}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: bayanihan-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:4000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    restart: unless-stopped
